<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>kn0 — Ingest Documents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    .sidebar {
      width: 220px; min-height: 100vh;
      background: #161b27;
      border-right: 1px solid #1e2535;
      position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column;
      padding: 1.5rem 1rem;
    }
    .sidebar .brand { font-size: 1.4rem; font-weight: 700; color: #7c6af7; letter-spacing: -0.5px; margin-bottom: 2rem; }
    .sidebar .nav-link { color: #94a3b8; border-radius: 8px; padding: .5rem .75rem; margin-bottom: .25rem; font-size: .9rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #1e2a45; color: #e2e8f0; }
    .sidebar .nav-link i { margin-right: .5rem; width: 1rem; text-align: center; }

    .main { margin-left: 220px; padding: 2.5rem; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #2d3748;
      border-radius: 16px;
      padding: 4rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: #161b27;
    }
    #drop-zone.drag-over {
      border-color: #7c6af7;
      background: #1a1e35;
    }
    #drop-zone .drop-icon { font-size: 3rem; color: #4a5568; margin-bottom: 1rem; }
    #drop-zone .drop-text { color: #718096; font-size: .95rem; }
    #drop-zone .drop-text span { color: #7c6af7; cursor: pointer; text-decoration: underline; }

    /* Options row */
    .options-row { background: #161b27; border-radius: 12px; padding: 1.25rem 1.5rem; border: 1px solid #1e2535; }
    .options-row label { color: #94a3b8; font-size: .85rem; margin-bottom: .3rem; display: block; }
    .options-row select, .options-row input[type=number] {
      background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0;
      border-radius: 8px; padding: .4rem .75rem; font-size: .875rem; width: 100%;
    }
    .options-row select:focus, .options-row input[type=number]:focus {
      outline: none; border-color: #7c6af7; box-shadow: 0 0 0 3px rgba(124,106,247,.15);
    }

    /* File list */
    #file-list { display: flex; flex-direction: column; gap: .75rem; }

    .file-card {
      background: #161b27; border: 1px solid #1e2535; border-radius: 12px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: .75rem;
      align-items: start;
    }
    .file-card .file-icon { font-size: 1.5rem; color: #4a5568; padding-top: .1rem; }
    .file-card .file-icon.pdf  { color: #e15759; }
    .file-card .file-icon.txt  { color: #76b7b2; }
    .file-card .file-icon.doc  { color: #4e79a7; }

    .file-card .file-name { font-size: .9rem; font-weight: 600; color: #e2e8f0; margin-bottom: .2rem; }
    .file-card .file-size { font-size: .78rem; color: #718096; }

    .file-card .status-badge {
      font-size: .75rem; border-radius: 20px;
      padding: .25rem .7rem; font-weight: 500;
      white-space: nowrap;
    }
    .status-queued   { background: #1e2535; color: #718096; }
    .status-uploading{ background: #1e2a45; color: #7c6af7; }
    .status-done     { background: #0d2818; color: #48bb78; }
    .status-duplicate{ background: #1a2c1a; color: #68d391; }
    .status-error    { background: #2d1515; color: #fc8181; }

    .result-row {
      margin-top: .5rem;
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .stat-chip {
      background: #0f1117; border: 1px solid #2d3748;
      border-radius: 8px; padding: .2rem .6rem;
      font-size: .75rem; color: #94a3b8;
    }
    .stat-chip strong { color: #e2e8f0; }

    .progress-bar-wrap {
      height: 3px; background: #1e2535; border-radius: 3px; margin-top: .5rem; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #7c6af7;
      border-radius: 3px;
      animation: indeterminate 1.4s infinite linear;
      width: 40%;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Upload button */
    #upload-btn {
      background: #7c6af7; border: none; color: #fff;
      padding: .6rem 1.75rem; border-radius: 10px; font-weight: 600;
      font-size: .9rem; transition: background .15s;
    }
    #upload-btn:hover:not(:disabled) { background: #6b58e8; }
    #upload-btn:disabled { opacity: .5; cursor: not-allowed; }

    #clear-btn {
      background: transparent; border: 1px solid #2d3748; color: #718096;
      padding: .6rem 1.25rem; border-radius: 10px; font-size: .9rem;
    }
    #clear-btn:hover { border-color: #4a5568; color: #94a3b8; }

    /* Hidden file input */
    #file-input { display: none; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand"><i class="bi bi-diagram-3"></i> kn0</div>
  <a href="/" class="nav-link active"><i class="bi bi-cloud-upload"></i> Ingest</a>
</nav>

<!-- Main content -->
<main class="main">
  <h4 class="fw-semibold mb-1">Ingest Documents</h4>
  <p class="text-secondary mb-4" style="font-size:.9rem">
    Upload one or more files to extract entities and relationships into the knowledge graph.
  </p>

  <!-- Drop zone -->
  <div id="drop-zone" role="button" aria-label="Drop files here or click to browse">
    <div class="drop-icon"><i class="bi bi-cloud-arrow-up"></i></div>
    <p class="mb-1 fw-semibold">Drop files here</p>
    <p class="drop-text mb-0">or <span id="browse-link">browse your computer</span></p>
    <p class="drop-text mt-2" style="font-size:.8rem">PDF, TXT, MD, DOCX supported</p>
  </div>
  <input type="file" id="file-input" multiple accept=".pdf,.txt,.md,.docx,.text"/>

  <!-- Options -->
  <div class="options-row mt-3 row g-3 align-items-end">
    <div class="col-auto">
      <label>Extraction backend</label>
      <select id="opt-backend">
        <option value="spacy">spaCy (fast, offline)</option>
        <option value="llm">LLM (slower, richer)</option>
      </select>
    </div>
    <div class="col-auto">
      <label>Source reliability <small class="text-secondary">(0 – 1)</small></label>
      <input type="number" id="opt-reliability" value="0.5" min="0" max="1" step="0.05" style="width:90px"/>
    </div>
    <div class="col-auto ms-auto d-flex gap-2">
      <button id="clear-btn" class="btn" onclick="clearAll()">Clear</button>
      <button id="upload-btn" class="btn" onclick="uploadAll()" disabled>
        <i class="bi bi-upload me-1"></i> Upload
      </button>
    </div>
  </div>

  <!-- File list -->
  <div id="file-list" class="mt-4"></div>
</main>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const fileList = [];   // [{file, id, card}]
let uploading = false;

// ─── Drop zone wiring ────────────────────────────────────────────────────────
const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const browseLink = document.getElementById('browse-link');
const uploadBtn  = document.getElementById('upload-btn');

dropZone.addEventListener('click', () => fileInput.click());
browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
});

fileInput.addEventListener('change', () => {
  addFiles(Array.from(fileInput.files));
  fileInput.value = '';   // reset so same file can be re-added
});

// ─── Add files to queue ──────────────────────────────────────────────────────
function addFiles(files) {
  files.forEach(f => {
    const id   = Math.random().toString(36).slice(2);
    const card = buildCard(f, id);
    fileList.push({ file: f, id, card, done: false });
    document.getElementById('file-list').appendChild(card);
  });
  syncUploadBtn();
}

function clearAll() {
  if (uploading) return;
  fileList.length = 0;
  document.getElementById('file-list').innerHTML = '';
  syncUploadBtn();
}

function syncUploadBtn() {
  uploadBtn.disabled = fileList.length === 0 || uploading;
}

// ─── Card builder ────────────────────────────────────────────────────────────
function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (ext === 'pdf')  return ['bi-file-earmark-pdf',  'pdf'];
  if (ext === 'docx') return ['bi-file-earmark-word', 'doc'];
  return ['bi-file-earmark-text', 'txt'];
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function buildCard(file, id) {
  const [icon, cls] = fileIcon(file.name);
  const div = document.createElement('div');
  div.className = 'file-card';
  div.id = 'card-' + id;
  div.innerHTML = `
    <i class="bi ${icon} file-icon ${cls}"></i>
    <div>
      <div class="file-name">${escHtml(file.name)}</div>
      <div class="file-size">${fmtSize(file.size)}</div>
      <div class="progress-bar-wrap d-none" id="prog-${id}">
        <div class="progress-bar-fill"></div>
      </div>
      <div class="result-row" id="result-${id}"></div>
    </div>
    <span class="status-badge status-queued" id="badge-${id}">Queued</span>`;
  return div;
}

// ─── Upload all files sequentially ───────────────────────────────────────────
async function uploadAll() {
  if (uploading) return;
  uploading = true;
  syncUploadBtn();

  const backend     = document.getElementById('opt-backend').value;
  const reliability = document.getElementById('opt-reliability').value;

  for (const item of fileList) {
    if (item.done) continue;
    await uploadOne(item, backend, reliability);
  }

  uploading = false;
  syncUploadBtn();
}

async function uploadOne(item, backend, reliability) {
  const { file, id } = item;

  setStatus(id, 'uploading', '<i class="bi bi-arrow-repeat spin me-1"></i>Processing…');
  document.getElementById('prog-' + id).classList.remove('d-none');

  const form = new FormData();
  form.append('file', file);
  form.append('backend', backend);
  form.append('source_reliability', reliability);

  let data;
  try {
    const resp = await fetch('/ingest', { method: 'POST', body: form });
    data = await resp.json();
  } catch (err) {
    setStatus(id, 'error', '<i class="bi bi-x-circle me-1"></i>Network error');
    showError(id, err.toString());
    item.done = true;
    document.getElementById('prog-' + id).classList.add('d-none');
    return;
  }

  document.getElementById('prog-' + id).classList.add('d-none');
  item.done = true;

  if (data.error) {
    setStatus(id, 'error', '<i class="bi bi-x-circle me-1"></i>Failed');
    showError(id, data.error);
    return;
  }

  if (data.was_duplicate) {
    setStatus(id, 'duplicate', '<i class="bi bi-check2 me-1"></i>Already ingested');
    showStats(id, data, true);
    return;
  }

  setStatus(id, 'done', '<i class="bi bi-check2-circle me-1"></i>Done');
  showStats(id, data, false);
}

// ─── Result helpers ───────────────────────────────────────────────────────────
function setStatus(id, cls, html) {
  const b = document.getElementById('badge-' + id);
  b.className = `status-badge status-${cls}`;
  b.innerHTML = html;
}

function showStats(id, data, isDuplicate) {
  const r = document.getElementById('result-' + id);
  if (isDuplicate) {
    r.innerHTML = chip('ID', data.document_id.slice(0, 8));
    return;
  }
  r.innerHTML = [
    chip('Pages', data.pages_processed),
    chip('Entities +', data.entities_created),
    chip('Merged', data.entities_merged),
    chip('Rels +', data.relationships_created),
    chip('Rels ↑', data.relationships_updated),
  ].join('');
}

function showError(id, msg) {
  const r = document.getElementById('result-' + id);
  r.innerHTML = `<span class="text-danger" style="font-size:.8rem">${escHtml(msg)}</span>`;
}

function chip(label, val) {
  return `<span class="stat-chip">${label}: <strong>${val}</strong></span>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<style>
.spin { display: inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
